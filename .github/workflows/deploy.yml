name: Deploy Frontend
on:
  push:
    branches: ["main"] # Replace with your default branch name
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./frontend" # Set this to your frontend folder name
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
