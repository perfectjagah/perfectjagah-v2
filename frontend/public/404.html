<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>PerfectJagah</title>
    <script>
      // SPA redirect for GitHub Pages — https://github.com/rafgraph/spa-github-pages
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.host +
          "/" +
          "?p=" +
          encodeURIComponent(l.pathname.slice(1) + l.search + l.hash),
      );
    </script>
  </head>
  <body></body>
</html>
